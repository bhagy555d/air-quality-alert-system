<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Quality Alert System</title>
    <style>
        /* Updated CSS to stack the components beautifully */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f3;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
            box-sizing: border-box;
            margin: 0;
        }

        .dashboard-card,
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            width: 100%;
            margin-bottom: 30px;
        }

        .dashboard-card {
            max-width: 600px;
            text-align: center;
        }

        .card {
            max-width: 400px;
        }

        h2 {
            color: #2c3e50;
            text-align: center;
            margin-top: 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        input:focus {
            border-color: #3498db;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #2980b9;
        }

        .btn-success {
            background-color: #28a745;
            width: auto;
            margin-left: 10px;
        }

        .btn-success:hover {
            background-color: #218838;
        }

        .search-container {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        #message {
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
            min-height: 20px;
        }

        #searchResult {
            margin-top: 20px;
            font-size: 1.1em;
        }
    </style>
</head>

<body>

    <div class="dashboard-card">
        <h2>🌍 Global Live Air Quality & AI Forecast</h2>
        <p style="color: #555; margin-bottom: 20px;">Check the current pollution and tomorrow's AI prediction for any
            city in the world.</p>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Enter any city (e.g., Paris, Tokyo, Nagpur)">
            <button class="btn-success" onclick="searchCity()">Search</button>
        </div>

        <div id="searchResult"></div>
    </div>

    <div class="card">
        <h2>🔔 AQI Alert Signup</h2>

        <form id="registerForm">
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="name" required placeholder="e.g. Bhagyashree">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required placeholder="your.email@gmail.com">
            </div>
            <div class="form-group">
                <label>City</label>
                <input type="text" id="city" required placeholder="e.g. Nagpur">
            </div>
            <div class="form-group">
                <label>Alert Threshold (AQI)</label>
                <input type="number" id="aqiThreshold" required placeholder="e.g. 100">
            </div>
            <button type="submit">Subscribe to Alerts</button>
        </form>

        <div id="message"></div>
    </div>

    <script>
        // --- NEW JAVASCRIPT FOR THE SEARCH BAR ---
        function searchCity() {
            const city = document.getElementById("searchInput").value;
            const resultDiv = document.getElementById("searchResult");

            if (!city) {
                resultDiv.innerHTML = "<span style='color: #e74c3c;'>Please enter a city name!</span>";
                return;
            }

            resultDiv.innerHTML = "⏳ Scanning global satellites and consulting AI...";

            fetch(`http://localhost:8080/api/aqi/search?city=${city}`)
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        resultDiv.innerHTML = `❌ <b style="color: #e74c3c;">${data.error}</b>`;
                    } else {
                        resultDiv.innerHTML = `
                            <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; display: inline-block; text-align: left; border: 1px solid #dee2e6;">
                                <h3 style="margin-top: 0; color: #2c3e50;">📍 ${data.city}</h3>
                                <p style="margin: 5px 0;">🌬️ Live AQI: <strong style="color: #dc3545; font-size: 1.4em;">${data.liveAqi}</strong></p>
                                <p style="margin: 5px 0;">🤖 AI Prediction for Tomorrow: <strong style="color: #6f42c1; font-size: 1.4em;">${data.predictedAqi}</strong></p>
                            </div>
                        `;
                    }
                })
                .catch(error => {
                    resultDiv.innerHTML = "❌ <span style='color: #e74c3c;'>Error connecting to the server. Is Java running?</span>";
                });
        }

        // --- YOUR ORIGINAL JAVASCRIPT FOR THE REGISTRATION FORM ---
        document.getElementById('registerForm').addEventListener('submit', async function (event) {
            event.preventDefault();

            const userData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                city: document.getElementById('city').value,
                aqiThreshold: parseInt(document.getElementById('aqiThreshold').value)
            };

            try {
                const response = await fetch('/api/users/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                if (response.ok) {
                    document.getElementById('message').style.color = '#27ae60';
                    document.getElementById('message').innerText = '✅ Successfully registered!';
                    document.getElementById('registerForm').reset();
                } else {
                    document.getElementById('message').style.color = '#e74c3c';
                    document.getElementById('message').innerText = '❌ Registration failed. Try again.';
                }
            } catch (error) {
                document.getElementById('message').style.color = '#e74c3c';
                document.getElementById('message').innerText = '❌ Server is offline.';
            }
        });
    </script>

</body>

</html>
