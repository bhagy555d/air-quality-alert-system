<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Quality Alert System</title>
    <style>
        /* CSS to make the form look modern and clean */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            color: #2c3e50;
            text-align: center;
            margin-top: 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        input:focus {
            border-color: #3498db;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #2980b9;
        }

        #message {
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
            min-height: 20px;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>🌍 AQI Alert Signup</h2>

        <form id="registerForm">
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="name" required placeholder="e.g. Bhagyashree">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required placeholder="your.email@gmail.com">
            </div>
            <div class="form-group">
                <label>City</label>
                <input type="text" id="city" required placeholder="e.g. Nagpur">
            </div>
            <div class="form-group">
                <label>Alert Threshold (AQI)</label>
                <input type="number" id="aqiThreshold" required placeholder="e.g. 100">
            </div>
            <button type="submit">Subscribe to Alerts</button>
        </form>

        <div id="message"></div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function (event) {
            // Stop the page from reloading when the button is clicked
            event.preventDefault();

            // Grab the data the user typed into the boxes
            const userData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                city: document.getElementById('city').value,
                aqiThreshold: parseInt(document.getElementById('aqiThreshold').value)
            };

            try {
                // Send the data to your Spring Boot REST controller
                const response = await fetch('/api/users/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                if (response.ok) {
                    document.getElementById('message').style.color = '#27ae60';
                    document.getElementById('message').innerText = '✅ Successfully registered!';
                    document.getElementById('registerForm').reset(); // Clear the form
                } else {
                    document.getElementById('message').style.color = '#e74c3c';
                    document.getElementById('message').innerText = '❌ Registration failed. Try again.';
                }
            } catch (error) {
                document.getElementById('message').style.color = '#e74c3c';
                document.getElementById('message').innerText = '❌ Server is offline.';
            }
        });
    </script>

</body>

</html>
